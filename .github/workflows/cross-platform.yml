name: Cross-platform smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cross-platform-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  smoke:
    name: Cross-platform smoke
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    uses: NDDev-it-com/nddev-ci-workflows/.github/workflows/cross-platform-smoke.yml@21bd3f7c3bbcbd7a9ecd3475b293d9e65aa8563a # 0.2.2
    with:
      os_list: '["${{ matrix.os }}"]'
      command: python3 -m pip install --user "pytest==9.1.1" && scripts/validate_fast.sh
