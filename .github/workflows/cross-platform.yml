name: Cross-platform smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cross-platform-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  smoke:
    name: Cross-platform smoke
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    uses: NDDev-it-com/nddev-ci-workflows/.github/workflows/cross-platform-smoke.yml@71f4345cad2998a16e8e14b800eee88c68d865ac # 0.2.3
    with:
      os_list: '["${{ matrix.os }}"]'
      command: python3 -m pip install --user "pytest==9.1.1" && scripts/validate_fast.sh
      windows_command: >-
        python3 -m pip install --user "pytest==9.1.1" &&
        scripts/validate_fast.sh --skip-tests &&
        python3 -m pytest -q
        tests/test_mimocode_config.py
        tests/test_mimocode_memory_boundary.py
        tests/test_mimocode_projection.py
        tests/test_release_assets.py
