name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      version:
        description: "Numeric SemVer X.Y.Z; manual dispatch only verifies an existing tag."
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
      - name: Install validation dependencies
        run: python3 -m pip install --user "pytest==9.1.1"
      - name: Resolve existing release tag
        env:
          INPUT_VERSION: ${{ inputs.version }}
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            version="$INPUT_VERSION"
            echo "manual dispatch only verifies an existing tag"
          else
            version="$REF_NAME"
          fi
          if ! printf '%s' "$version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "release version '$version' is not numeric SemVer X.Y.Z" >&2
            exit 1
          fi
          file_version="$(tr -d '[:space:]' < VERSION)"
          if [ "$version" != "$file_version" ]; then
            echo "release version '$version' does not match VERSION '$file_version'" >&2
            exit 1
          fi

          remote_ref="refs/tags/${version}"
          remote_match="$(git ls-remote --refs origin "$remote_ref")"
          remote_count="$(printf '%s\n' "$remote_match" | awk 'NF { count++ } END { print count + 0 }')"
          if [ "$remote_count" -ne 1 ]; then
            echo "Expected exactly one existing remote tag $remote_ref" >&2
            exit 1
          fi
          read -r remote_oid remote_name <<< "$remote_match"
          if [ "$remote_name" != "$remote_ref" ]; then
            echo "Remote returned unexpected ref $remote_name" >&2
            exit 1
          fi
          git fetch --no-tags --force origin "$remote_ref:$remote_ref"
          local_oid="$(git rev-parse --verify "$remote_ref")"
          if [ "$local_oid" != "$remote_oid" ]; then
            echo "Fetched tag object does not match $remote_ref on origin" >&2
            exit 1
          fi
          tag_commit="$(git rev-parse --verify "${remote_ref}^{commit}")"

          git fetch --no-tags --force origin main:refs/remotes/origin/main
          if [ "$EVENT_NAME" = "push" ]; then
            git merge-base --is-ancestor "$GITHUB_SHA" origin/main
            if [ "$tag_commit" != "$GITHUB_SHA" ]; then
              echo "Pushed tag peels to $tag_commit, not event commit $GITHUB_SHA" >&2
              exit 1
            fi
          else
            git merge-base --is-ancestor "$tag_commit" origin/main
          fi
          git checkout --detach "$tag_commit"
          printf 'RELEASE_VERSION=%s\n' "$version" >> "$GITHUB_ENV"
      - name: Validate release surfaces
        run: scripts/validate_fast.sh
      - name: Build source archive
        run: |
          set -euo pipefail
          mkdir -p dist
          git archive --format=zip --prefix=rldyour-mimocode/ -o dist/rldyour-mimocode-source.zip HEAD
          python3 scripts/release_sbom.py --output dist/sbom.spdx.json
          sha256sum dist/rldyour-mimocode-source.zip dist/sbom.spdx.json > dist/SHA256SUMS
          python3 scripts/validate_release_assets.py dist
      - name: Attest source archive
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: dist/rldyour-mimocode-source.zip
      - name: Attest SBOM
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: dist/sbom.spdx.json
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${RELEASE_VERSION}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" dist/rldyour-mimocode-source.zip dist/SHA256SUMS dist/sbom.spdx.json --clobber
            gh release edit "$tag" --title "$tag" --notes-file CHANGELOG.md --draft=false --prerelease=false
          else
            gh release create "$tag" dist/rldyour-mimocode-source.zip dist/SHA256SUMS dist/sbom.spdx.json \
              --title "$tag" \
              --notes-file CHANGELOG.md \
              --verify-tag
          fi
