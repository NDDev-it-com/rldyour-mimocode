name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      version:
        description: Numeric version tag to publish
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
      - name: Resolve release version
        env:
          INPUT_VERSION: ${{ inputs.version }}
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            version="$INPUT_VERSION"
          else
            version="$REF_NAME"
          fi
          if ! printf '%s' "$version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "release version '$version' is not numeric SemVer X.Y.Z" >&2
            exit 1
          fi
          file_version="$(tr -d '[:space:]' < VERSION)"
          if [ "$version" != "$file_version" ]; then
            echo "release version '$version' does not match VERSION '$file_version'" >&2
            exit 1
          fi
          printf 'RELEASE_VERSION=%s\n' "$version" >> "$GITHUB_ENV"
      - name: Validate release surfaces
        run: scripts/validate_fast.sh
      - name: Create release tag (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          set -euo pipefail
          if git rev-parse -q --verify "refs/tags/${RELEASE_VERSION}" >/dev/null; then
            echo "Tag ${RELEASE_VERSION} already exists locally"
          else
            git tag "${RELEASE_VERSION}"
            git push origin "refs/tags/${RELEASE_VERSION}"
          fi
      - name: Build source archive
        run: |
          set -euo pipefail
          mkdir -p dist
          git archive --format=zip --prefix=rldyour-mimocode/ -o dist/rldyour-mimocode-source.zip HEAD
          sha256sum dist/rldyour-mimocode-source.zip > dist/SHA256SUMS
          printf '{"name":"rldyour-mimocode","version":"%s","sbom":"source-only"}\n' "$(cat VERSION)" > dist/sbom.spdx.json
      - name: Attest source archive
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: dist/rldyour-mimocode-source.zip
      - name: Attest SBOM
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: dist/sbom.spdx.json
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${RELEASE_VERSION}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" dist/rldyour-mimocode-source.zip dist/SHA256SUMS dist/sbom.spdx.json --clobber
            gh release edit "$tag" --title "$tag" --notes-file CHANGELOG.md --draft=false --prerelease=false
          else
            gh release create "$tag" dist/rldyour-mimocode-source.zip dist/SHA256SUMS dist/sbom.spdx.json \
              --title "$tag" \
              --notes-file CHANGELOG.md \
              --verify-tag
          fi
