name: Scorecard

on:
  push:
    branches: [main]
  schedule:
    - cron: "17 6 * * 3"
  workflow_dispatch:

permissions: {}

concurrency:
  group: scorecard-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scorecard:
    name: Scorecard
    permissions:
      id-token: write
      contents: read
      actions: read
    uses: NDDev-it-com/nddev-ci-workflows/.github/workflows/public-scorecard-json.yml@1acba687361415b3f5942acceb40b228bb0387fd # 0.2.4
    with:
      publish_results: false
